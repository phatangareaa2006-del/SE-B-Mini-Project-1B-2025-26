name: autohub
description: AutoHub – Market-Ready Vehicle Marketplace
version: 3.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cached_network_image: ^3.3.1
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.1
  uuid: ^4.5.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  url_launcher: ^6.2.5
  image_picker: ^1.1.2
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^1.2.0
  timeago: ^3.7.0
  share_plus: ^10.1.2
  shared_preferences: ^2.3.2
  razorpay_flutter: ^1.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
